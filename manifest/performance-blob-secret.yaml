---
# Secret for Azure Blob Storage upload credentials.
# Supports both service principal and managed identity auth.
#
# Service principal: populate AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID
# Managed identity:  leave those three blank — AKS workload identity is used automatically
#
# Values must be base64-encoded:  echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: blob-upload-secret
  namespace: testing
type: Opaque
data:
  STORAGE_ACCOUNT: ""       # base64-encoded storage account name
  BLOB_CONTAINER: ""        # base64-encoded container name
  AZURE_CLIENT_ID: ""       # base64-encoded SP client ID     (optional — managed identity)
  AZURE_CLIENT_SECRET: ""   # base64-encoded SP client secret (optional — managed identity)
  AZURE_TENANT_ID: ""       # base64-encoded tenant ID        (optional — managed identity)
